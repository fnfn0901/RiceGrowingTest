<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결과 화면</title>
  <link rel="stylesheet" href="./assets/css/result.css">
</head>
<body>
  <div class="container">
    <!-- 직업 이미지를 담을 부분 -->
    <div class="job-image">
      <svg xmlns="http://www.w3.org/2000/svg" width="229" height="258" viewBox="0 0 229 258" fill="none">
        <circle cx="100" cy="129" r="128" fill="white"/>
        <circle cx="100" cy="129" r="128.5" stroke="#347928" stroke-opacity="0.3"/>
      </svg>
    </div>

    <!-- statframe 추가 -->
    <div class="statframe">
      <img src="./assets/images/statframe.png" alt="스탯 프레임">

      <!-- 제목창 -->
      <div class="title-box">
        <div class="lv-box">Lv. 99</div>
        <div class="info-box">
          <div class="name">이름:</div>
          <div class="job">직업:</div>
        </div>
      </div>
    </div>
  </div>
  <script src="./assets/js/result.js"></script>
</body>
</html>
