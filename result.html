<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결과 화면</title>
  <link rel="stylesheet" href="./assets/css/result.css">
</head>
<body>
  <div class="container">
    <div class="job-image">
      <img src="./assets/images/result/result01.png" alt="Job Image">
    </div>
    <div class="stat-frame">
      <!-- SVG 파일을 직접 삽입 -->
      <svg xmlns="http://www.w3.org/2000/svg" width="230" height="280" viewBox="0 0 230 280" fill="none">
        <rect x="1.5" y="1.5" width="227" height="277" fill="white" stroke="#347928" stroke-width="3"/>
      </svg>
      <div class="stat-content">
        <div class="level">Lv. 99</div>
        <div class="job-box">
          <span class="job-label">직업</span>
        </div>
        <div class="job-title">쌀 품종 개발자</div>
        <div class="line">
          <img src="./assets/images/line.svg" alt="선 이미지">
        </div>
        <div class="stats">
          <div>체력 : 3200 / 3200</div>
          <div>정신력 : 1200 / 1200</div>
          <div>근력 : 168</div>
          <div>순발력 : 186</div>
          <div>지능 : 68</div>
          <div>친화력 : 59</div>
        </div>
      </div>
    </div>

    <!-- 직업 유형 분포도 -->
    <div class="other-jobs">
      <div class="other-jobs-text">다른 직업 더 알아보기 !</div>
      <div class="ssalmi-image">
          <img src="../assets/images/SsalMi.png" alt="쌀미 이미지" />
      </div>
    </div>

    <!-- Best Job -->
    <div class="best-job">
      <img src="./assets/images/best-image-frame.svg" alt="Best Job Frame" />
      <div class="best-job-text">나랑 찰떡궁합이잖아?</div>
      <img class="best-description-frame" src="./assets/images/best-description-frame.svg" alt="Best Description Frame" />
    </div>

    <!-- Wost Job -->
    <div class="wost-job" style="position: absolute; top: 1179px;">
      <img src="./assets/images/best-image-frame.svg" alt="Wost Job Frame" />
      <div class="wost-job-text">흠 글쎄요...</div>
      <img class="wost-description-frame" src="./assets/images/best-description-frame.svg" alt="Best Description Frame" />
    </div>

    <!-- Event Image 추가 -->
    <div class="event-image">
      <img src="./assets/images/eventImage.png" alt="Event Image" />
    </div>

  </div>
  <script src="./assets/js/result.js"></script>

  <!-- 테스트 다시하기 버튼 -->
  <div class="retest-button">
    <img src="./assets/images/retestButton.svg" alt="Retest Button" class="retest-button-img" />
    <div class="retest-content">
      <span class="retest-text">테스트 다시하기</span>
      <img src="./assets/images/retestIcon.svg" alt="Retest Icon" class="retest-icon" />
    </div>
  </div>
</body>
</html>
