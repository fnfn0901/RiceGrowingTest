<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쌀 키우기 테스트</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div class="container">
    <div class="background">
      <img src="./assets/images/indexTitle.svg" alt="쌀 키우기 테스트 타이틀" class="title-img">
      <div class="play-button">
        <img src="./assets/images/mainStartButton.svg" alt="시작 버튼 아이콘" class="play-icon">
        <span class="play-text">PLAY</span>
      </div>
      <div class="participants-text">참여자 수 | 2,432명</div>
      <div class="share-buttons">
        <div class="share-button">
          <img src="./assets/images/kakaoButton.png" alt="카카오톡 버튼" class="kakao-icon">
          <span class="share-text">카카오톡</span>
        </div>
        <div class="share-button">
          <img src="./assets/images/shareButton.svg" alt="링크복사 버튼" class="link-icon">
          <span class="share-text">링크복사</span>
        </div>
      </div>
    </div>
  </div>
  <script src="./assets/js/animation.js"></script>
</body>
</html>
